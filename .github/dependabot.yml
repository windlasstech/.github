# Dependabot configuration for Windlass .github repository
# Security-hardened supply chain automation following SLSA compliance
#
# References:
# - https://docs.github.com/en/code-security/dependabot
# - SECURITY.md for supply chain integrity requirements

version: 2

updates:
  # Bun/NPM ecosystem - development dependencies for linting/formatting
  # Uses bun.lock for deterministic dependency resolution
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    # Security updates are prioritized and created immediately
    open-pull-requests-limit: 10
    # Group related dependencies to reduce PR noise
    groups:
      # Development tooling dependencies
      dev-dependencies:
        patterns:
          - 'lefthook'
          - 'markdownlint-cli2'
          - 'prettier'
        update-types:
          - 'minor'
          - 'patch'
    # Commit message conventions aligned with repository standards
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore(dev)'
      include: 'scope'
    # Labels for easy identification and triage
    labels:
      - 'dependencies'
      - 'javascript'
    # Semantic versioning strategy
    versioning-strategy: 'auto'
    # Allow all direct dependencies (production and development)
    allow:
      - dependency-type: 'direct'
    # Cooldown: Development dependencies per SECURITY.md (NPM/Bun Development)
    # Patch: 1-3 days | Minor: 3-7 days | Major: 14-21 days
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    # Ignore specific patterns if needed (currently none)
    ignore: []

  # GitHub Actions - critical for SLSA compliance and SHA-pinning
  # All workflows use SHA-pinned actions per SECURITY.md requirements
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    groups:
      # Group GitHub official actions together
      github-actions:
        patterns:
          - 'actions/*'
        update-types:
          - 'minor'
          - 'patch'
      # Step-security actions (harden-runner)
      step-security-actions:
        patterns:
          - 'step-security/*'
        update-types:
          - 'minor'
          - 'patch'
      # OpenSSF Scorecard action
      scorecard-actions:
        patterns:
          - 'ossf/scorecard-action'
        update-types:
          - 'minor'
          - 'patch'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'security'
    # Cooldown: GitHub Actions per SECURITY.md
    # Patch: 0-3 days | Minor: 1-3 days | Major: 7 days
    # Shorter cooldowns acceptable: Actions are SHA-pinned and supply chain risk > regression risk
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 1
      semver-patch-days: 0

# Note: This repository has no Docker, no other package ecosystems
# If future ecosystems are added (e.g., Python for scripts), add sections here
