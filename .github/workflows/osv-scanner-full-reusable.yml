name: OSV Scanner Full

on:
  workflow_call:
    inputs:
      scan-args:
        description: 'Additional scan arguments, one per line. Do not set --format or --output.'
        required: false
        type: string
        default: |-
          --recursive
          ./
      results-file-name:
        description: 'SARIF results file name'
        required: false
        type: string
        default: 'results.sarif'
      download-artifact:
        description: 'Optional artifact name to download before scanning'
        required: false
        type: string
        default: ''
      ref:
        description: 'Optional branch, tag, or commit to scan'
        required: false
        type: string
        default: ''
      upload-sarif:
        description: 'Upload SARIF to code scanning when available for this repository'
        required: false
        type: boolean
        default: true
      fail-on-vuln:
        description: 'Fail when vulnerabilities are found'
        required: false
        type: boolean
        default: true
      checkout-submodules:
        description: 'Checkout git submodules'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan-full:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: ${{ inputs.checkout-submodules }}
          ref: ${{ inputs.ref }}

      - name: Download custom artifact if specified
        if: ${{ inputs.download-artifact != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: ${{ inputs.download-artifact }}
          path: ./

      - name: Run scanner
        uses: google/osv-scanner-action/osv-scanner-action@eb5b619bb565d10623076caba5263750fde3c790 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --output=results.json
            --format=json
            ${{ inputs.scan-args }}

      - name: Build SARIF report
        uses: google/osv-scanner-action/osv-reporter-action@eb5b619bb565d10623076caba5263750fde3c790 # v2.3.5
        with:
          scan-args: |-
            --output=${{ inputs.results-file-name }}
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=${{ inputs.fail-on-vuln }}

      - name: Upload SARIF to code scanning
        if: ${{ inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: ${{ inputs.results-file-name }}
