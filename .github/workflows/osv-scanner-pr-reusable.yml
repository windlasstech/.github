name: OSV Scanner PR

on:
  workflow_call:
    inputs:
      scan-args:
        description: 'Additional scan arguments, one per line. Do not set --format or --output.'
        required: false
        type: string
        default: |-
          --recursive
          ./
      results-file-name:
        description: 'SARIF results file name'
        required: false
        type: string
        default: 'results.sarif'
      upload-sarif:
        description: 'Upload SARIF to code scanning when available for this repository'
        required: false
        type: boolean
        default: true
      fail-on-vuln:
        description: 'Fail when the pull request introduces new vulnerabilities'
        required: false
        type: boolean
        default: true
      checkout-submodules:
        description: 'Checkout git submodules'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan-pr:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: ${{ inputs.checkout-submodules }}

      - name: Checkout target branch
        run: |
          git checkout "$GITHUB_BASE_REF"
          git submodule update --recursive

      - name: Run scanner on base branch
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            ${{ inputs.scan-args }}

      - name: Checkout current branch
        run: |
          git checkout -f "$GITHUB_SHA"
          git submodule update --recursive

      - name: Run scanner on PR branch
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            ${{ inputs.scan-args }}

      - name: Build SARIF report
        uses: google/osv-scanner-action/osv-reporter-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9 # v2.3.5
        with:
          scan-args: |-
            --output=${{ inputs.results-file-name }}
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=${{ inputs.fail-on-vuln }}

      - name: Upload SARIF to code scanning
        if: ${{ inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: ${{ inputs.results-file-name }}
